<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>轻言-轻拾人间辞藻，言说万千心绪</title>
    <!-- Favicon 玫瑰色花瓣 -->
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23fb7185' d='M50 15 C70 25 85 45 75 65 C65 85 35 85 25 65 C15 45 30 25 50 15 Z' transform='rotate(45 50 50)'/%3E%3C/svg%3E"/>
    <link rel="apple-touch-icon"
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23fb7185' d='M50 15 C70 25 85 45 75 65 C65 85 35 85 25 65 C15 45 30 25 50 15 Z' transform='rotate(45 50 50)'/%3E%3C/svg%3E"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes charFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(2px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes authorFadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
                filter: blur(1px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        body {
            font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, serif;
            background-color: #0a0505;
            color: #f4f4f5;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .bg-glow {
            position: fixed;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(ellipse at center, rgba(251, 113, 133, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .sakura {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            will-change: transform;
        }

        .sakura span {
            display: block;
            background: linear-gradient(135deg, rgba(251, 113, 133, 0.7) 0%, rgba(244, 114, 182, 0.5) 100%);
            border-radius: 50% 0 50% 50%;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .music-btn {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #52525b;
            cursor: pointer;
            transition: color 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .music-btn:hover {
            color: #fb7185;
        }

        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.25rem;
            position: relative;
            z-index: 20;
        }

        .quote-container {
            text-align: center;
            max-width: 48rem;
            width: 100%;
        }

        .quote-text {
            font-size: 1rem;
            line-height: 2;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: #d4d4d8;
            -webkit-line-clamp: 6;
            overflow: hidden;
            transition: opacity 0.3s ease;
        }

        .quote-text .char {
            display: inline-block;
            opacity: 0;
            animation: charFadeIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .quote-author {
            margin-top: 1.5rem;
            font-size: 0.65rem;
            color: #52525b;
            letter-spacing: 0.12em;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.15rem;
            transition: opacity 0.3s ease;
        }

        .quote-author::before,
        .quote-author::after {
            content: '';
            width: 1.8rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(251, 113, 133, 0.35), transparent);
            opacity: 0;
        }

        footer {
            position: fixed;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }

        .next-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #52525b;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .next-btn .line {
            width: 1px;
            height: 1.5rem;
            background-color: #2b2b2b;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        .next-btn .line::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fb7185;
            transform: translateY(-100%);
            transition: transform 0.5s ease;
        }

        .next-btn:hover {
            color: #fb7185;
        }

        .next-btn:hover .line {
            background-color: rgba(251, 113, 133, 0.4);
        }

        .next-btn:hover .line::after {
            transform: translateY(0);
        }

        ::selection {
            background-color: rgba(251, 113, 133, 0.3);
        }

        /* 平板 */
        @media (min-width: 640px) {
            header {
                padding: 1.5rem 2rem;
            }

            main {
                padding: 0 1.5rem;
            }

            .music-btn {
                font-size: 0.75rem;
                letter-spacing: 0.32em;
            }

            .quote-text {
                font-size: 1.15rem;
                line-height: 2.1;
                -webkit-line-clamp: 5;
            }

            .quote-author {
                margin-top: 1.8rem;
                font-size: 0.68rem;
                letter-spacing: 0.13em;
            }

            .quote-author::before, .quote-author::after {
                width: 2.2rem;
            }

            footer {
                bottom: 1.5rem;
            }

            .next-btn {
                font-size: 0.65rem;
                gap: 0.6rem;
            }

            .next-btn .line {
                height: 1.8rem;
            }
        }

        /* 桌面 */
        @media (min-width: 768px) {
            header {
                padding: 2rem 2.5rem;
            }

            main {
                padding: 0 2rem;
            }

            .music-btn {
                font-size: 0.85rem;
                letter-spacing: 0.35em;
            }

            .quote-text {
                font-size: 1.875rem;
                line-height: 2.4;
            }

            .quote-author {
                margin-top: 2.5rem;
                font-size: 0.75rem;
                letter-spacing: 0.15em;
                gap: 0.8rem;
            }

            .quote-author::before, .quote-author::after {
                width: 2.5rem;
            }

            footer {
                bottom: 2rem;
            }

            .next-btn {
                font-size: 0.7rem;
                letter-spacing: 0.35em;
                gap: 0.75rem;
            }

            .next-btn .line {
                height: 2rem;
            }
        }

        @media (min-width: 1024px) {
            .quote-text {
                font-size: 2.65rem;
                line-height: 2.5;
            }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div id="sakura-container"></div>

<header>
    <div class="music-btn">LiteWords</div>
    <div></div>
</header>

<main>
    <div class="quote-container" th:each="s : ${hitokotoFinder.randomSentences(1, null)}">
        <h1 class="quote-text" id="quoteText" th:text="${s.content}">加载中...</h1>
        <p class="quote-author" id="quoteAuthor"
           th:attr="data-author=${s.author}, data-source=${s.source}"
           th:text="${s.author} ? ${s.author} + (${s.source} ? ' · 《' + ${s.source} + '》' : '') : '佚名'">
        </p>
    </div>
</main>

<footer>
    <button class="next-btn" id="nextBtn">
        Next
        <span class="line"></span>
    </button>
</footer>

<script>
    function animateText(elementId) {
        const element = document.getElementById(elementId);
        const text = element.innerText.trim();
        element.innerHTML = '';
        let delay = 0;
        const charDelay = 0.035;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const span = document.createElement('span');
            span.className = 'char';
            span.textContent = char === ' ' ? '\u00A0' : char;
            span.style.animationDelay = `${delay}s`;
            element.appendChild(span);
            delay += charDelay;
        }
    }

    function animateAuthor(callback) {
        const el = document.getElementById('quoteAuthor');
        const text = el.innerText.trim();
        el.innerHTML = '';
        el.style.opacity = '1';
        let delay = 0;
        const authorCharDelay = 0.05;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const span = document.createElement('span');
            span.textContent = char === ' ' ? '\u00A0' : char;
            span.style.cssText = `
                display: inline-block;
                opacity: 0;
                animation: authorFadeIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
                animation-delay: ${delay}s;
            `;
            el.appendChild(span);
            delay += authorCharDelay;
        }
        const lineDelay = delay - authorCharDelay + 0.4;
        const styleSheet = document.createElement('style');
        styleSheet.id = 'dynamic-line-delay';
        styleSheet.textContent = `
            #quoteAuthor::before,
            #quoteAuthor::after {
                animation: authorFadeIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
                animation-delay: ${lineDelay}s;
            }
        `;
        const oldStyle = document.getElementById('dynamic-line-delay');
        if (oldStyle) oldStyle.remove();
        document.head.appendChild(styleSheet);
        const totalDuration = (lineDelay + 0.7) * 1000;
        if (callback) setTimeout(callback, totalDuration);
    }

    document.addEventListener('DOMContentLoaded', () => {
        animateText('quoteText');
        animateAuthor();
    });

    const sakuraList = [];
    const container = document.getElementById('sakura-container');
    let mouseX = -1000, mouseY = -1000;
    document.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });
    document.addEventListener('touchmove', e => {
        mouseX = e.touches[0].clientX;
        mouseY = e.touches[0].clientY;
    });

    function createSakura() {
        const sakura = document.createElement('div');
        sakura.className = 'sakura';
        const petal = document.createElement('span');
        sakura.appendChild(petal);
        const size = Math.random() * 6 + 8;
        petal.style.width = size + 'px';
        petal.style.height = size + 'px';
        const x = Math.random() * window.innerWidth;
        const y = -30;
        const speed = Math.random() * 0.8 + 0.4;
        const wobbleSpeed = Math.random() * 0.02 + 0.01;
        const wobbleAmount = Math.random() * 40 + 20;
        const rotationSpeed = (Math.random() - 0.5) * 2;
        const sakuraData = {
            element: sakura, x, y, baseX: x, speed, wobbleSpeed, wobbleAmount,
            rotation: Math.random() * 360, rotationSpeed,
            time: Math.random() * Math.PI * 2, size, vx: 0, vy: 0,
            opacity: Math.random() * 0.4 + 0.4
        };
        petal.style.opacity = sakuraData.opacity;
        sakura.style.transform = `translate(${x}px, ${y}px) rotate(${sakuraData.rotation}deg)`;
        container.appendChild(sakura);
        sakuraList.push(sakuraData);
    }

    function animateSakura() {
        for (let i = sakuraList.length - 1; i >= 0; i--) {
            const s = sakuraList[i];
            const dx = s.x - mouseX, dy = s.y - mouseY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 100) {
                const force = (100 - distance) / 100;
                const angle = Math.atan2(dy, dx);
                s.vx += Math.cos(angle) * force * 3;
                s.vy += Math.sin(angle) * force * 2;
                s.rotation += force * 10;
            }
            s.vx *= 0.98;
            s.vy *= 0.98;
            s.time += s.wobbleSpeed;
            s.y += s.speed;
            s.x = s.baseX + Math.sin(s.time) * s.wobbleAmount;
            s.x += s.vx;
            s.y += s.vy;
            s.rotation += s.rotationSpeed;
            s.element.style.transform = `translate(${s.x}px, ${s.y}px) rotate(${s.rotation}deg)`;
            if (s.y > window.innerHeight + 50) {
                s.element.remove();
                sakuraList.splice(i, 1);
            }
        }
        requestAnimationFrame(animateSakura);
    }

    for (let i = 0; i < 15; i++) setTimeout(createSakura, i * 100);
    setInterval(createSakura, 500);
    animateSakura();

    document.getElementById('nextBtn').addEventListener('click', async () => {
        try {
            const res = await fetch('/hitokoto');
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const newText = doc.getElementById('quoteText')?.innerText?.trim();
            const newAuthorEl = doc.getElementById('quoteAuthor');
            const newAuthor = newAuthorEl?.getAttribute('data-author') || '';
            const newSource = newAuthorEl?.getAttribute('data-source') || '';
            if (newText) {
                const textEl = document.getElementById('quoteText');
                const authorEl = document.getElementById('quoteAuthor');
                textEl.style.opacity = '0';
                authorEl.style.opacity = '0';
                const oldStyle = document.getElementById('dynamic-line-delay');
                if (oldStyle) oldStyle.remove();
                setTimeout(() => {
                    textEl.innerText = newText;
                    authorEl.setAttribute('data-author', newAuthor);
                    authorEl.setAttribute('data-source', newSource);
                    authorEl.innerText = newAuthor
                            ? newAuthor + (newSource ? ' · 《' + newSource + '》' : '')
                            : '佚名';
                    textEl.style.opacity = '1';
                    animateText('quoteText');
                    animateAuthor();
                }, 300);
            }
        } catch (e) {
            console.error('刷新失败', e);
        }
    });
</script>
</body>
</html>
