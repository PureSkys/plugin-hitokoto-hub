name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  ci:
    uses: halo-sigs/reusable-workflows/.github/workflows/plugin-ci.yaml@v4
    with:
      ui-path: "ui"
      pnpm-version: 10
      node-version: 24
      java-version: 21

  upload-artifact:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin
      - name: 构建的文件
        run: ls -lh